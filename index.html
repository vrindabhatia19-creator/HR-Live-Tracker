<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Projects &amp; Analytics</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#05080f;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding:24px 16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a0f1a}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
.wrap{max-width:1300px;margin:0 auto}
.header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:28px}
.subtitle{font-size:10px;color:#334155;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:26px;font-weight:700;letter-spacing:-.02em;color:#f8fafc}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;transition:background .3s}
.btn-add{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-add:hover{opacity:.85}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:#0a0f1a;border:1px solid #0f172a;border-radius:12px;padding:14px 16px}
.stat-num{font-size:24px;font-weight:800;display:block;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:10px;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.prog-wrap{background:#0a0f1a;border:1px solid #0f172a;border-radius:12px;padding:14px 18px;margin-bottom:18px}
.prog-head{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-lbl{font-size:10px;color:#334155;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.prog-pct{font-size:11px;color:#1e3a5f;font-weight:700}
.prog-track{background:#0f172a;border-radius:4px;height:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:4px;transition:width .6s ease}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-in{background:#0a0f1a;border:1px solid #0f172a;color:#f1f5f9;border-radius:8px;padding:8px 13px;font-size:13px;flex:1 1 200px;min-width:160px;font-family:inherit;outline:none}
.search-in::placeholder{color:#1e293b}
.sel{background:#0a0f1a;border:1px solid #0f172a;color:#475569;border-radius:8px;padding:8px 11px;font-size:12px;cursor:pointer;font-family:inherit;outline:none}
.btn-clr{background:#0f172a;color:#334155;border:none;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.add-panel{background:#0a0f1a;border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:20px;margin-bottom:16px;display:none}
.add-panel.open{display:block}
.add-ttl{font-size:11px;color:#6366f1;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.add-in{background:#05080f;border:1px solid #0f172a;color:#f1f5f9;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;width:100%}
.add-in::placeholder{color:#1e293b}
.add-acts{display:flex;gap:8px}
.btn-submit{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cxl{background:#0f172a;color:#334155;border:none;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.tbl-wrap{background:#080c14;border:1px solid #0f172a;border-radius:14px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:#0a0f1a;border-bottom:1px solid #0f172a}
th{padding:12px 14px;text-align:left}
.th-btn{background:none;border:none;color:#334155;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:0;font-family:inherit}
.th-btn:hover{color:#64748b}
tbody tr{border-bottom:1px solid #0a0f1a;transition:background .12s}
tbody tr.even{background:#080c14}
tbody tr.odd{background:#060a12}
tbody tr:hover{background:#0d1425!important}
td{padding:10px 14px;font-size:13px;vertical-align:middle}
.td-sno{color:#1e293b;font-size:11px;font-weight:700}
.td-task{font-weight:500;color:#cbd5e1;max-width:220px}
.td-rmk{font-size:12px;color:#334155;max-width:180px}
.td-due{font-size:12px;color:#475569;white-space:nowrap}
.age-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid transparent}
.age-none{color:#1e293b}
.age-ok{color:#4ade80;background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.2)}
.age-warn{color:#fbbf24;background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.age-over{color:#f87171;background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.25)}
.age-critical{color:#fff;background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.5)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap;border:1px solid transparent}
.bdot{width:5px;height:5px;border-radius:50%;display:inline-block}
.b-complete,.b-done{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(74,222,128,.25)}
.b-ongoing{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.25)}
.b-started{background:rgba(96,165,250,.1);color:#60a5fa;border-color:rgba(96,165,250,.25)}
.b-notstarted{background:rgba(248,113,113,.1);color:#f87171;border-color:rgba(248,113,113,.25)}
.owner-chip{background:#0f172a;color:#475569;font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600}
.row-acts{display:flex;gap:5px}
.btn-edit{background:#0f172a;color:#334155;border:none;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer}
.btn-edit:hover{background:#1e293b;color:#64748b}
.btn-del{background:rgba(248,113,113,.08);color:#f87171;border:none;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer}
.btn-del:hover{background:rgba(248,113,113,.15)}
.edit-in{background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;width:100%}
.btn-rsave{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-rcancel{background:#1e293b;color:#475569;border:1px solid #334155;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
.tbl-foot{padding:11px 18px;border-top:1px solid #0a0f1a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.foot-count{font-size:11px;color:#1e293b}
.age-legend{display:flex;gap:12px;flex-wrap:wrap}
.age-legend span{font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px}
.empty-row{text-align:center;padding:40px;color:#1e293b;font-size:14px}
@keyframes rowFlash{0%{background:#1a2d4a!important}100%{}}
.flash{animation:rowFlash 1s ease}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f2a1a;color:#4ade80;border:1px solid rgba(74,222,128,.25);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:9999;display:none;white-space:nowrap}
.toast.show{display:block}
.toast.err{background:#1f0808;color:#f87171;border-color:rgba(248,113,113,.25)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid #1e293b;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="subtitle">Important Tasks</div>
      <h1>HR Projects &amp; Analytics</h1>
    </div>
    <div class="hdr-right">
      <span style="display:flex;align-items:center;font-size:11px;font-weight:600">
        <span class="sync-dot" id="syncDot" style="background:#fbbf24"></span>
        <span id="syncTxt" style="color:#475569">Connecting…</span>
      </span>
      <button class="btn-add" onclick="toggleAdd()"><span style="font-size:17px;line-height:1">+</span> Add Task</button>
    </div>
  </div>

  <div id="loadingScreen" style="text-align:center;padding:80px 0">
    <div class="spinner"></div>
    <p style="margin-top:16px;color:#334155;font-size:12px;letter-spacing:.1em;text-transform:uppercase">Loading shared tracker…</p>
  </div>

  <div id="mainContent" style="display:none">
    <div class="stats" id="statsBar"></div>
    <div class="prog-wrap">
      <div class="prog-head">
        <span class="prog-lbl">Overall Completion</span>
        <span class="prog-pct" id="progPct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="filters">
      <input class="search-in" id="srch" placeholder="Search tasks, owners, remarks…" oninput="render()"/>
      <select class="sel" id="stF" onchange="render()">
        <option value="All">All Statuses</option>
        <option>Complete</option><option>Done</option><option>Ongoing</option><option>Started</option><option>Not Started</option>
      </select>
      <select class="sel" id="owF" onchange="render()"><option value="All">All Owners</option></select>
      <select class="sel" id="ageF" onchange="render()">
        <option value="All">All Ageing</option>
        <option value="overdue">Overdue</option>
        <option value="due7">Due in 7 days</option>
        <option value="nodue">No due date</option>
      </select>
      <button class="btn-clr" id="clrBtn" onclick="clearF()" style="display:none">Clear ✕</button>
    </div>
    <div class="add-panel" id="addPanel">
      <div class="add-ttl">New Task</div>
      <div class="add-grid">
        <input class="add-in" id="nTask" placeholder="Task name *"/>
        <input class="add-in" id="nOwner" placeholder="Owner *"/>
        <select class="add-in" id="nStatus">
          <option>Not Started</option><option>Started</option><option>Ongoing</option><option>Done</option><option>Complete</option>
        </select>
        <input class="add-in" id="nDue" type="date"/>
        <input class="add-in" id="nRemarks" placeholder="Remarks" style="grid-column:1/-1"/>
      </div>
      <div class="add-acts">
        <button class="btn-submit" onclick="addTask()">Add Task</button>
        <button class="btn-cxl" onclick="toggleAdd()">Cancel</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th><button class="th-btn" onclick="toggleSort('sno')"># <span id="s-sno">↑</span></button></th>
              <th><button class="th-btn" onclick="toggleSort('task')">Task <span id="s-task">↕</span></button></th>
              <th><button class="th-btn" onclick="toggleSort('owner')">Owner <span id="s-owner">↕</span></button></th>
              <th><button class="th-btn" onclick="toggleSort('status')">Status <span id="s-status">↕</span></button></th>
              <th><button class="th-btn" onclick="toggleSort('dueDate')">Due Date <span id="s-dueDate">↕</span></button></th>
              <th><button class="th-btn" onclick="toggleSort('_age')">Ageing <span id="s-_age">↕</span></button></th>
              <th><button class="th-btn" onclick="toggleSort('remarks')">Remarks <span id="s-remarks">↕</span></button></th>
              <th><span style="font-size:10px;color:#0f172a;font-weight:700;text-transform:uppercase">Actions</span></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="tbl-foot">
        <span class="foot-count" id="footCount"></span>
        <div class="age-legend">
          <span style="color:#4ade80"><span style="width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block"></span>On track</span>
          <span style="color:#fbbf24"><span style="width:7px;height:7px;border-radius:50%;background:#fbbf24;display:inline-block"></span>Due soon</span>
          <span style="color:#f87171"><span style="width:7px;height:7px;border-radius:50%;background:#f87171;display:inline-block"></span>Overdue</span>
          <span style="color:#ef4444"><span style="width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block"></span>Critical &gt;30d</span>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Firebase config ──
var DB_URL = 'https://hr-tracker-70b02-default-rtdb.firebaseio.com';
var TASKS_URL = DB_URL + '/tasks.json';

var TODAY=new Date();TODAY.setHours(0,0,0,0);
var DONE_ST=['Complete','Done'];
var BDOT={Complete:'#4ade80',Done:'#4ade80',Ongoing:'#fbbf24',Started:'#60a5fa','Not Started':'#f87171'};
var BCLS={Complete:'b-complete',Done:'b-done',Ongoing:'b-ongoing',Started:'b-started','Not Started':'b-notstarted'};

var DEFAULT_TASKS=[
  {id:1,sno:1,task:"Task Force Deliverables",owner:"Vrinda",status:"Ongoing",dueDate:"",remarks:"3 Tasks Allocated"},
  {id:2,sno:2,task:"Footwear Manpower Status",owner:"Sayosri/Rhea",status:"Ongoing",dueDate:"",remarks:"Critical Requirements Tracking in progress"},
  {id:3,sno:3,task:"CPFR",owner:"Atharva",status:"Complete",dueDate:"",remarks:"Complete"},
  {id:4,sno:4,task:"SLDP",owner:"Atharva",status:"Complete",dueDate:"",remarks:"Complete"},
  {id:5,sno:5,task:"HRMIS - Review, Clean Up & Awareness",owner:"Sapana",status:"Started",dueDate:"",remarks:"Data Reviewed, Manpower snapshot shared"},
  {id:6,sno:6,task:"Incentive - Automation",owner:"Sapana",status:"Not Started",dueDate:"",remarks:"NA"},
  {id:7,sno:7,task:"System Clean Up - Org",owner:"Shincy",status:"Ongoing",dueDate:"",remarks:"Position Text Standardisation list shared with NHQ"},
  {id:8,sno:8,task:"Geo Structure",owner:"Vrinda/Sapana",status:"Ongoing",dueDate:"",remarks:"Base Data received"},
  {id:9,sno:9,task:"Employee Queries - Bindaas Bol TAT",owner:"Sayosri",status:"Ongoing",dueDate:"",remarks:"TAT 24 hrs for sharing queries & 48 hrs for response from HR"},
  {id:10,sno:10,task:"Attrition Dashboard & Report",owner:"Sapana",status:"Done",dueDate:"",remarks:"Complete"},
  {id:11,sno:11,task:"Talent Mobility Policy",owner:"Vrinda",status:"Done",dueDate:"",remarks:"Policy Approved, Execution in progress"},
  {id:12,sno:12,task:"Employee Engagement Policy/Newsletter/PPT",owner:"Vrinda",status:"Ongoing",dueDate:"",remarks:"Engagement Calendar in place, Newsletter Released, PPT ready"},
  {id:13,sno:13,task:"Brands Out Tracker Clean Up",owner:"Sayosri",status:"Done",dueDate:"",remarks:"Complete"},
  {id:14,sno:14,task:"Store Manager/SIC",owner:"Sayosri/Rhea",status:"Ongoing",dueDate:"",remarks:""},
  {id:15,sno:15,task:"Manpower in Dehired Stores",owner:"Sayosri",status:"Ongoing",dueDate:"",remarks:""},
  {id:16,sno:16,task:"Claude Enterprise Access",owner:"Vrinda",status:"Done",dueDate:"",remarks:"Complete"},
  {id:17,sno:17,task:"Talent Deployment Status & Follow Up",owner:"Rhea",status:"Ongoing",dueDate:"",remarks:""},
  {id:18,sno:18,task:"Swadesh Policy",owner:"Sapana",status:"Not Started",dueDate:"",remarks:"NA"},
  {id:19,sno:19,task:"Future Fit Project",owner:"Sapana",status:"Ongoing",dueDate:"",remarks:"Stage II Started"},
  {id:20,sno:21,task:"HR Hygiene - Data Quality & Timeliness",owner:"Vrinda",status:"Ongoing",dueDate:"",remarks:"Weekly Tracker Creation & Circulation Started"},
  {id:21,sno:22,task:"South 1 & 2 Streamlining",owner:"Vrinda",status:"Ongoing",dueDate:"",remarks:"Employee Re-Distribution to CHR Done, Offer Targets given, EJP resolved, Data Hygiene Ongoing"},
  {id:22,sno:23,task:"Manpower Status Analysis",owner:"Vrinda/Atharva",status:"Started",dueDate:"",remarks:"Reworking on Analysis, Requirements & Tracker"}
];

var tasks=[];
var editId=null,sortBy='sno',sortDir='asc';

function setSyncUI(state,msg){
  var colors={live:'#4ade80',saving:'#60a5fa',error:'#f87171',connecting:'#fbbf24'};
  document.getElementById('syncDot').style.background=colors[state]||'#475569';
  document.getElementById('syncTxt').style.color=colors[state]||'#475569';
  document.getElementById('syncTxt').textContent=msg;
}

// ── Firebase REST API ──
async function fbGet(){
  var res=await fetch(TASKS_URL);
  if(!res.ok)throw new Error('HTTP '+res.status);
  return await res.json();
}
async function fbSet(data){
  var res=await fetch(TASKS_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!res.ok)throw new Error('HTTP '+res.status);
  return await res.json();
}

async function loadFromFirebase(){
  try{
    setSyncUI('connecting','Connecting…');
    var data=await fbGet();
    if(data&&Array.isArray(data)&&data.length>0){
      tasks=data;
    } else {
      // First load — seed with default tasks
      tasks=DEFAULT_TASKS;
      await fbSet(tasks);
    }
    setSyncUI('live','Live ✓');
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainContent').style.display='block';
    buildOwnerDd();render();
    // Start real-time polling every 10s
    setInterval(pollFirebase,10000);
  }catch(err){
    setSyncUI('error','Error — retrying…');
    setTimeout(loadFromFirebase,3000);
  }
}

async function pollFirebase(){
  try{
    var data=await fbGet();
    if(data&&Array.isArray(data)){
      tasks=data;
      buildOwnerDd();render();
      setSyncUI('live','Live ✓');
    }
  }catch(e){setSyncUI('error','Sync error');}
}

async function saveToFirebase(){
  try{
    setSyncUI('saving','Saving…');
    await fbSet(tasks);
    setSyncUI('live','Saved ✓');
    setTimeout(function(){setSyncUI('live','Live ✓');},1500);
  }catch(e){
    setSyncUI('error','Save failed');
    showToast('Save failed — check connection',true);
  }
}

// ── Ageing ──
function ageDays(t){
  if(!t.dueDate||DONE_ST.indexOf(t.status)>-1)return null;
  var d=new Date(t.dueDate);d.setHours(0,0,0,0);
  return Math.round((TODAY-d)/(1000*60*60*24));
}
function ageChip(t){
  var d=ageDays(t);
  if(d===null){return DONE_ST.indexOf(t.status)>-1?'<span class="age-chip age-ok">✓ Done</span>':'<span class="age-chip age-none">—</span>';}
  if(d>30)return '<span class="age-chip age-critical">🔴 '+d+'d overdue</span>';
  if(d>0) return '<span class="age-chip age-over">⚠ '+d+'d overdue</span>';
  if(d===0)return '<span class="age-chip age-warn">⚡ Due today</span>';
  var r=-d;
  return r<=7?'<span class="age-chip age-warn">'+r+'d left</span>':'<span class="age-chip age-ok">'+r+'d left</span>';
}

// ── Helpers ──
function owners(){
  var s=new Set();
  tasks.forEach(function(t){t.owner.split('/').forEach(function(o){s.add(o.trim());});});
  return Array.from(s).sort();
}
function buildOwnerDd(){
  var sel=document.getElementById('owF'),cur=sel.value;
  while(sel.options.length>1)sel.remove(1);
  owners().forEach(function(o){var op=document.createElement('option');op.value=o;op.text=o;sel.add(op);});
  sel.value=cur||'All';
}
function updateStats(){
  var done=tasks.filter(function(t){return DONE_ST.indexOf(t.status)>-1;}).length;
  var overdue=tasks.filter(function(t){var d=ageDays(t);return d!==null&&d>0;}).length;
  var pct=tasks.length?Math.round(done/tasks.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=done+'/'+tasks.length+' · '+pct+'%';
  var defs=[
    {v:tasks.length,l:'Total',c:'#94a3b8'},
    {v:done,l:'Done',c:'#4ade80'},
    {v:tasks.filter(function(t){return t.status==='Ongoing';}).length,l:'Ongoing',c:'#fbbf24'},
    {v:tasks.filter(function(t){return t.status==='Started';}).length,l:'Started',c:'#60a5fa'},
    {v:tasks.filter(function(t){return t.status==='Not Started';}).length,l:'Not Started',c:'#f87171'},
    {v:overdue,l:'Overdue',c:'#ef4444'}
  ];
  document.getElementById('statsBar').innerHTML=defs.map(function(d){
    return '<div class="stat-card"><span class="stat-num" style="color:'+d.c+'">'+d.v+'</span><span class="stat-lbl">'+d.l+'</span></div>';
  }).join('');
}
function badge(st){
  var cls=BCLS[st]||'',dot=BDOT[st]||'#94a3b8';
  return '<span class="badge '+cls+'"><span class="bdot" style="background:'+dot+'"></span>'+e(st)+'</span>';
}
function fmtDate(ds){if(!ds)return '—';var p=ds.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getFiltered(){
  var srch=document.getElementById('srch').value.toLowerCase();
  var stF=document.getElementById('stF').value;
  var owF=document.getElementById('owF').value;
  var ageF=document.getElementById('ageF').value;
  return tasks.filter(function(t){
    if(stF!=='All'&&t.status!==stF)return false;
    if(owF!=='All'&&t.owner.indexOf(owF)<0)return false;
    if(srch&&t.task.toLowerCase().indexOf(srch)<0&&t.owner.toLowerCase().indexOf(srch)<0&&(t.remarks||'').toLowerCase().indexOf(srch)<0)return false;
    if(ageF==='overdue'){var d=ageDays(t);if(d===null||d<=0)return false;}
    if(ageF==='due7'){var d=ageDays(t);if(d===null||d>0||d<-7)return false;}
    if(ageF==='nodue'&&t.dueDate)return false;
    return true;
  }).map(function(t){return Object.assign({},t,{_age:ageDays(t)===null?-9999:ageDays(t)});})
  .sort(function(a,b){
    var va=a[sortBy],vb=b[sortBy];
    if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}
    return sortDir==='asc'?(va>vb?1:-1):(va<vb?1:-1);
  });
}

function render(){
  var rows=getFiltered();
  var body=document.getElementById('tbody');
  var has=document.getElementById('srch').value||document.getElementById('stF').value!=='All'||document.getElementById('owF').value!=='All'||document.getElementById('ageF').value!=='All';
  document.getElementById('clrBtn').style.display=has?'block':'none';
  if(!rows.length){
    body.innerHTML='<tr><td colspan="8" class="empty-row">No tasks match your filters</td></tr>';
    document.getElementById('footCount').textContent='0 of '+tasks.length+' tasks';
    updateStats();return;
  }
  body.innerHTML=rows.map(function(t,i){
    var rc=i%2===0?'even':'odd';
    if(editId===t.id){
      return '<tr class="'+rc+'" id="r'+t.id+'">'
        +'<td class="td-sno">'+t.sno+'</td>'
        +'<td><input class="edit-in" id="et" value="'+e(t.task)+'"/></td>'
        +'<td><input class="edit-in" id="eo" value="'+e(t.owner)+'"/></td>'
        +'<td><select class="edit-in" id="es" style="width:auto">'
        +['Complete','Done','Ongoing','Started','Not Started'].map(function(s){return '<option'+(s===t.status?' selected':'')+'>'+s+'</option>';}).join('')
        +'</select></td>'
        +'<td><input class="edit-in" id="edu" type="date" value="'+e(t.dueDate||'')+'"/></td>'
        +'<td>'+ageChip(t)+'</td>'
        +'<td><input class="edit-in" id="er" value="'+e(t.remarks||'')+'"/></td>'
        +'<td><div class="row-acts"><button class="btn-rsave" onclick="saveEdit('+t.id+')">Save</button><button class="btn-rcancel" onclick="cancelEdit()">✕</button></div></td>'
        +'</tr>';
    }
    return '<tr class="'+rc+'" id="r'+t.id+'">'
      +'<td class="td-sno">'+t.sno+'</td>'
      +'<td class="td-task">'+e(t.task)+'</td>'
      +'<td><span class="owner-chip">'+e(t.owner)+'</span></td>'
      +'<td>'+badge(t.status)+'</td>'
      +'<td class="td-due">'+fmtDate(t.dueDate)+'</td>'
      +'<td>'+ageChip(t)+'</td>'
      +'<td class="td-rmk">'+(e(t.remarks)||'—')+'</td>'
      +'<td><div class="row-acts"><button class="btn-edit" onclick="startEdit('+t.id+')" title="Edit">✏️</button><button class="btn-del" onclick="delTask('+t.id+')" title="Delete">🗑</button></div></td>'
      +'</tr>';
  }).join('');
  document.getElementById('footCount').textContent=rows.length+' of '+tasks.length+' tasks';
  updateStats();
}

function toggleSort(col){
  if(sortBy===col)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortBy=col;sortDir='asc';}
  ['sno','task','owner','status','dueDate','_age','remarks'].forEach(function(c){
    var el=document.getElementById('s-'+c);if(el)el.textContent=c===sortBy?(sortDir==='asc'?'↑':'↓'):'↕';
  });
  render();
}

function startEdit(id){editId=id;render();}
function cancelEdit(){editId=null;render();}

function saveEdit(id){
  tasks=tasks.map(function(t){
    return t.id===id?Object.assign({},t,{
      task:document.getElementById('et').value,
      owner:document.getElementById('eo').value,
      status:document.getElementById('es').value,
      dueDate:document.getElementById('edu').value,
      remarks:document.getElementById('er').value
    }):t;
  });
  editId=null;buildOwnerDd();render();saveToFirebase();
  var row=document.getElementById('r'+id);
  if(row){row.classList.add('flash');setTimeout(function(){row.classList.remove('flash');},1000);}
}

function delTask(id){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(function(t){return t.id!==id;});
  buildOwnerDd();render();saveToFirebase();
}

function toggleAdd(){
  var p=document.getElementById('addPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))document.getElementById('nTask').focus();
}

function addTask(){
  var t=document.getElementById('nTask').value.trim();
  var o=document.getElementById('nOwner').value.trim();
  if(!t||!o){alert('Task name and owner are required.');return;}
  var maxSno=tasks.length>0?Math.max.apply(null,tasks.map(function(x){return x.sno||0;})):0;
  tasks.push({id:Date.now(),sno:maxSno+1,task:t,owner:o,status:document.getElementById('nStatus').value,dueDate:document.getElementById('nDue').value,remarks:document.getElementById('nRemarks').value});
  document.getElementById('nTask').value='';
  document.getElementById('nOwner').value='';
  document.getElementById('nStatus').value='Not Started';
  document.getElementById('nDue').value='';
  document.getElementById('nRemarks').value='';
  document.getElementById('addPanel').classList.remove('open');
  buildOwnerDd();render();saveToFirebase();showToast('Task added ✓');
}

function clearF(){
  document.getElementById('srch').value='';
  document.getElementById('stF').value='All';
  document.getElementById('owF').value='All';
  document.getElementById('ageF').value='All';
  render();
}

function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(err?' err':'');
  setTimeout(function(){t.className='toast';},2500);
}

loadFromFirebase();
</script>
</body>
</html>
